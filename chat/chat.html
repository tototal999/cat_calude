<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>ClaudeCat</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #1e1e1e;
         color: #ddd; font-size: 14px; height: 100vh; overflow: hidden; }
  .tabs { display: flex; background: #2a2a2a; }
  .tabs button { flex: 1; padding: 10px; border: 0; background: #2a2a2a;
                 color: #999; font-size: 14px; cursor: pointer; }
  .tabs button.active { background: #1e1e1e; color: #fff;
                        border-bottom: 2px solid #4a9eff; }
  .page { display: none; padding: 12px; }
  .page.active { display: block; }

  /* ---- schedule page (unchanged) ---- */
  #errors { color: #ff6b6b; white-space: pre-line; margin-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; }
  td, th { padding: 6px 4px; border-bottom: 1px solid #333; text-align: left; }
  .summary { color: #9ad; }
  .del { color: #ff6b6b; cursor: pointer; background: none; border: none; }
  form { margin-top: 14px; padding: 10px; background: #262626; border-radius: 6px; }
  form .row { margin-bottom: 8px; display: flex; gap: 8px; align-items: center; }
  label { min-width: 68px; color: #aaa; }
  input, select { background: #333; color: #eee; border: 1px solid #555;
                  padding: 4px 6px; border-radius: 4px; }
  input[type=number] { width: 64px; }
  .primary { background: #4a9eff; color: #fff; border: 0; padding: 6px 16px;
             border-radius: 4px; cursor: pointer; }
  .muted { color: #777; }
  .rowline:hover { background: #2c2c2c; cursor: pointer; }

  /* ---- chat page ---- */
  #page-chat.active { display: flex; flex-direction: column;
    height: calc(100vh - 42px); padding: 0; }
  .chat-toolbar { display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; background: #262626; border-bottom: 1px solid #333; }
  .chat-toolbar select { font-size: 13px; max-width: 260px; }
  .chat-toolbar button { background: #333; color: #ccc; border: 1px solid #555;
    padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .chat-toolbar button:hover { background: #444; }

  #chat-messages { flex: 1; overflow-y: auto; padding: 12px; }
  .msg { margin-bottom: 14px; line-height: 1.5; }
  .msg-user { text-align: right; }
  .msg-user .bubble { display: inline-block; background: #3a5a8a; color: #eee;
    padding: 8px 12px; border-radius: 12px 12px 2px 12px; max-width: 80%;
    text-align: left; white-space: pre-wrap; word-break: break-word; }
  .msg-assistant .bubble { display: inline-block; background: #333;
    padding: 8px 12px; border-radius: 12px 12px 12px 2px; max-width: 80%;
    text-align: left; white-space: pre-wrap; word-break: break-word; }
  .msg-system { text-align: center; }
  .msg-system .bubble { display: inline-block; color: #888; font-size: 12px;
    font-style: italic; }
  .msg-actions { margin-top: 4px; }
  .msg-actions button { background: none; border: none; color: #777;
    cursor: pointer; font-size: 12px; padding: 2px 6px; }
  .msg-actions button:hover { color: #4a9eff; }
  .degraded { color: #888; font-size: 12px; font-style: italic;
    margin-top: 4px; }

  .chat-input { display: flex; gap: 8px; padding: 10px 12px;
    background: #262626; border-top: 1px solid #333; }
  .chat-input textarea { flex: 1; background: #333; color: #eee;
    border: 1px solid #555; border-radius: 6px; padding: 8px;
    font-family: inherit; font-size: 14px; resize: none;
    min-height: 38px; max-height: 120px; line-height: 1.4; }
  .chat-input textarea:focus { outline: none; border-color: #4a9eff; }
  .chat-input button { background: #4a9eff; color: #fff; border: 0;
    padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px;
    align-self: flex-end; white-space: nowrap; }
  .chat-input button:disabled { background: #555; color: #888; cursor: default; }
  .typing { color: #aaa; padding: 4px 12px; font-size: 13px; }
</style>
</head>
<body>
<div class="tabs">
  <button id="tab-schedule" class="active" onclick="showTab('schedule')">排程</button>
  <button id="tab-chat" onclick="showTab('chat')">交談</button>
</div>

<div id="page-schedule" class="page active">
  <div id="errors"></div>
  <table>
    <thead><tr><th>啟用</th><th>標題</th><th>週期</th><th></th></tr></thead>
    <tbody id="list"></tbody>
  </table>

  <form onsubmit="return false">
    <input type="hidden" id="f-id">
    <div class="row"><label>標題</label><input id="f-title" style="flex:1"></div>
    <div class="row"><label>週期</label>
      <select id="f-type" onchange="syncFields()">
        <option value="daily">每天</option>
        <option value="weekly">每星期</option>
        <option value="hourly">每小時</option>
      </select>
      <span id="f-day-wrap"><select id="f-day">
        <option>MO</option><option>TU</option><option>WE</option><option>TH</option>
        <option>FR</option><option>SA</option><option>SU</option>
      </select></span>
      <span id="f-time-wrap"><input id="f-time" type="time" value="09:00"></span>
      <span id="f-minute-wrap">第 <input id="f-minute" type="number" min="0" max="59" value="0"> 分</span>
    </div>
    <div class="row"><label>提前警示</label>
      <input id="f-lead" type="number" min="0" value="0"> 分鐘（0＝只正點）</div>
    <div class="row">
      <button class="primary" onclick="submitForm()" id="f-submit">新增</button>
      <button onclick="resetForm()" style="background:#444;color:#ccc;border:0;
              padding:6px 12px;border-radius:4px;cursor:pointer">清空</button>
      <span id="f-msg" class="muted"></span>
    </div>
  </form>
  <p class="muted">改動即存檔;點清單列可載入編輯。錯過的排程不補發。</p>
</div>

<div id="page-chat" class="page">
  <div class="chat-toolbar">
    <span style="color:#aaa;font-size:12px">模型</span>
    <select id="model-select" onchange="onModelChange()"></select>
    <span style="flex:1"></span>
    <button onclick="exportChat()" title="匯出完整對話">📤 匯出</button>
  </div>
  <div id="chat-messages"></div>
  <div id="chat-typing" class="typing" style="display:none">🐱…</div>
  <div class="chat-input">
    <textarea id="chat-input" rows="1" placeholder="說點什麼..."
      onkeydown="onInputKey(event)"></textarea>
    <button id="chat-send" onclick="sendMessage()">送出</button>
  </div>
</div>

<script>
/* ============ Shared ============ */

function showTab(t) {
  for (const p of ['schedule', 'chat']) {
    document.getElementById('page-' + p).classList.toggle('active', p === t);
    document.getElementById('tab-' + p).classList.toggle('active', p === t);
  }
  if (t === 'chat' && !_chatInited) initChat();
}

/* ============ Schedule page (unchanged) ============ */

function summary(it) {
  if (it.type === 'daily')  return '每天 ' + it.time;
  if (it.type === 'weekly') return '每週' + it.day + ' ' + it.time;
  return '每小時 :' + String(it.minute).padStart(2, '0');
}

function render(data) {
  document.getElementById('errors').innerText =
    data.errors.length ? '⚠ ' + data.errors.join('\n⚠ ') : '';
  const tb = document.getElementById('list');
  tb.innerHTML = '';
  for (const it of data.items) {
    const tr = document.createElement('tr');
    tr.className = 'rowline';
    const lead = it.lead_min ? ' (提前' + it.lead_min + '分)' : '';
    tr.innerHTML =
      '<td><input type="checkbox"' + (it.enabled ? ' checked' : '') + '></td>' +
      '<td>' + it.title + '</td>' +
      '<td class="summary">' + summary(it) + lead + '</td>' +
      '<td><button class="del">刪除</button></td>';
    tr.querySelector('input').onclick = (e) => {
      e.stopPropagation();
      it.enabled = e.target.checked;
      pywebview.api.upsert_schedule(it).then(r => render({items: r.items, errors: []}));
    };
    tr.querySelector('.del').onclick = (e) => {
      e.stopPropagation();
      pywebview.api.delete_schedule(it.id).then(r => render({items: r.items, errors: []}));
    };
    tr.onclick = () => loadForm(it);
    tb.appendChild(tr);
  }
}

function syncFields() {
  const t = document.getElementById('f-type').value;
  document.getElementById('f-day-wrap').style.display = t === 'weekly' ? '' : 'none';
  document.getElementById('f-time-wrap').style.display = t === 'hourly' ? 'none' : '';
  document.getElementById('f-minute-wrap').style.display = t === 'hourly' ? '' : 'none';
}

function loadForm(it) {
  document.getElementById('f-id').value = it.id;
  document.getElementById('f-title').value = it.title;
  document.getElementById('f-type').value = it.type;
  if (it.day) document.getElementById('f-day').value = it.day;
  if (it.time) document.getElementById('f-time').value = it.time;
  if (it.minute !== undefined) document.getElementById('f-minute').value = it.minute;
  document.getElementById('f-lead').value = it.lead_min || 0;
  document.getElementById('f-submit').innerText = '儲存';
}

function resetForm() {
  document.getElementById('f-id').value = '';
  document.getElementById('f-title').value = '';
  document.getElementById('f-submit').innerText = '新增';
  document.getElementById('f-msg').innerText = '';
}

function submitForm() {
  const t = document.getElementById('f-type').value;
  const item = {
    id: document.getElementById('f-id').value || undefined,
    title: document.getElementById('f-title').value.trim(),
    type: t,
    lead_min: parseInt(document.getElementById('f-lead').value || '0', 10),
    enabled: true,
  };
  if (t === 'weekly') item.day = document.getElementById('f-day').value;
  if (t !== 'hourly') item.time = document.getElementById('f-time').value;
  if (t === 'hourly') item.minute = parseInt(document.getElementById('f-minute').value, 10);
  pywebview.api.upsert_schedule(item).then(r => {
    document.getElementById('f-msg').innerText = r.error ? ('⚠ ' + r.error) : '已存檔';
    if (!r.error) { render({items: r.items, errors: []}); resetForm(); }
  });
}

/* ============ Chat page ============ */

let _chatInited = false;
let _composing = false;   // IME composing guard (spec: isComposing)
let _sending = false;     // send lock: block re-send while generating

function initChat() {
  _chatInited = true;
  // populate model dropdown
  pywebview.api.list_models().then(models => {
    const sel = document.getElementById('model-select');
    sel.innerHTML = '';
    for (const m of models) {
      const opt = document.createElement('option');
      opt.value = m; opt.textContent = m;
      sel.appendChild(opt);
    }
    pywebview.api.current_model().then(cur => { sel.value = cur; });
  });
  // warm-up probe
  appendSystem('正在連線…');
  pywebview.api.probe().then(err => {
    if (err) {
      appendSystem('⚠ LLM 離線: ' + err);
    } else {
      clearMessages();
      appendSystem('已連線，可以開始對話');
    }
  });
  // auto-resize textarea
  const ta = document.getElementById('chat-input');
  ta.addEventListener('compositionstart', () => { _composing = true; });
  ta.addEventListener('compositionend', () => { _composing = false; });
  ta.addEventListener('input', () => autoResize(ta));
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

function onInputKey(e) {
  // Enter sends; Shift+Enter newline; composing Enter = IME confirm
  if (e.key === 'Enter' && !e.shiftKey && !_composing) {
    e.preventDefault();
    sendMessage();
  }
}

function onModelChange() {
  const m = document.getElementById('model-select').value;
  pywebview.api.set_model(m);
}

function sendMessage() {
  if (_sending) return;
  const ta = document.getElementById('chat-input');
  const text = ta.value.trim();
  if (!text) return;

  _sending = true;
  document.getElementById('chat-send').disabled = true;
  ta.value = '';
  autoResize(ta);

  appendUser(text);
  document.getElementById('chat-typing').style.display = '';
  scrollBottom();

  pywebview.api.send_message(text).then(result => {
    document.getElementById('chat-typing').style.display = 'none';
    _sending = false;
    document.getElementById('chat-send').disabled = false;

    if (result.error) {
      appendSystem('⚠ ' + result.error);
    } else {
      appendAssistant(result.content, result.model);
      if (result.degraded) {
        appendDegraded(result.degraded);
      }
    }
    scrollBottom();
    ta.focus();
  });
}

function appendUser(text) {
  const el = document.createElement('div');
  el.className = 'msg msg-user';
  el.innerHTML = '<div class="bubble"></div>';
  el.querySelector('.bubble').textContent = text;
  document.getElementById('chat-messages').appendChild(el);
}

function appendAssistant(text, model) {
  const el = document.createElement('div');
  el.className = 'msg msg-assistant';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  el.appendChild(bubble);
  // save button
  const actions = document.createElement('div');
  actions.className = 'msg-actions';
  const saveBtn = document.createElement('button');
  saveBtn.textContent = '💾 存檔';
  saveBtn.onclick = () => {
    pywebview.api.save_note(text, model).then(r => {
      saveBtn.textContent = r.error ? '⚠ 失敗' : '✓ 已存';
      saveBtn.disabled = true;
    });
  };
  actions.appendChild(saveBtn);
  el.appendChild(actions);
  document.getElementById('chat-messages').appendChild(el);
}

function appendSystem(text) {
  const el = document.createElement('div');
  el.className = 'msg msg-system';
  el.innerHTML = '<div class="bubble"></div>';
  el.querySelector('.bubble').textContent = text;
  document.getElementById('chat-messages').appendChild(el);
}

function appendDegraded(text) {
  const el = document.createElement('div');
  el.className = 'degraded';
  el.textContent = text;
  document.getElementById('chat-messages').appendChild(el);
}

function clearMessages() {
  document.getElementById('chat-messages').innerHTML = '';
}

function scrollBottom() {
  const c = document.getElementById('chat-messages');
  c.scrollTop = c.scrollHeight;
}

function exportChat() {
  pywebview.api.export_chat().then(r => {
    if (r.error) {
      appendSystem('⚠ 匯出失敗: ' + r.error);
    } else {
      appendSystem('✓ 已匯出: ' + r.path);
    }
  });
}

/* ============ Init ============ */

window.addEventListener('pywebviewready', () => {
  syncFields();
  pywebview.api.get_tab().then(t => {
    showTab(t);
  });
  pywebview.api.list_schedules().then(render);
});
</script>
</body>
</html>
